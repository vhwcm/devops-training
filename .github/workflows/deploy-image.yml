on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build e Push
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/server-node:latest .
          docker push ${{ secrets.DOCKER_USER }}/server-node:latest
